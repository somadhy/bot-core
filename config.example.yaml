# Copy to config.yaml and adjust. Path: MESHCORE_BOT_CONFIG or ./config.yaml
#
# Docker (compose): в контейнере USB пробрасывается как /dev/ttyUSB0 — укажите его здесь,
# даже если на хосте порт /dev/ttyACM0 (см. SERIAL_DEVICE в docker-compose.yml).
#
# Диагностика (индексы каналов для channels.enabled_indices):
#   Docker:  docker compose --profile diagnose run --rm diagnose
#   Локально: python -m meshcore_bot --diagnose

serial:
  device: /dev/ttyUSB0   # Docker в compose: оставьте ttyUSB0. Windows без Docker: COM3
  baudrate: 115200

channels:
  enabled_indices: [0]

dm:
  enabled: true

locale: ru   # ru | en

# Пауза перед любым ответом бота (секунды). Максимум 600. 0 — без задержки.
reply_delay_sec: 0

# Личные ответы: ждать ACK доставки; при таймауте — повтор отправки.
dm_delivery:
  wait_sec: 10
  max_attempts: 2

# Периодический адверт узла (meshcore send_advert). 0 — выключено.
# Первый адверт после первого полного интервала с момента старта бота.
advert:
  interval_hours: 0
  flood: true   # true — широкий «flood»-адверт (см. прошивку / meshcore)

nodes:
  # Срок хранения записей узлов (в днях), полученных из snapshots контактов companion.
  advert_retention_days: 7
  # Максимум хранимых узлов (при превышении остаются самые свежие).
  max_stored: 5000
  # Сколько первых байт ключа показывать в команде node/узел (1..4).
  key_preview_bytes: 2
  # Путь к JSON-хранилищу узлов.
  store_path: data/node_adverts.json

poll:
  # Keepalive (чтобы USB/companion/радио не "засыпали" при простое).
  # 0 — выключить. Можно переопределить env-переменными:
  #   MESHCORE_BOT_KEEPALIVE_SEC
  #   MESHCORE_BOT_KEEPALIVE_ONLY_WHEN_IDLE_SEC
  keepalive_sec: 60
  # Keepalive шлётся только если не было RX ≥ N секунд (защита от лишних запросов).
  keepalive_only_when_idle_sec: 30

weather:
  # openmeteo — без API-ключа, обычно доступен из РФ (api.open-meteo.com)
  # openweathermap — нужен WEATHER_API_KEY
  # meteostat — без API-ключа (используется Bulk Data: data.meteostat.net; обновление может запаздывать до ~24ч).
  # meteostat_rapidapi — Meteostat JSON API через RapidAPI (нужен RAPIDAPI_KEY).
  provider: openmeteo
  # Запасной провайдер: используется, если основной вернул ошибку.
  # Можно указать любой поддерживаемый провайдер. Пусто/отсутствует — без fallback.
  fallback_provider: meteostat
  default_city: Moscow
  # Кеш ответа по одному городу (минуты). 0 — без кеша.
  cache_ttl_minutes: 15

blacklist:
  path: data/blacklist.json

admins:
  # Full public keys (hex, 64 chars typical). Remote stop: stop / стоп — in DM (sender known).
  public_keys: []
  # Индексы каналов (должны быть в channels.enabled_indices), где stop / стоп разрешён любому участнику.
  channel_indices: []

commands:
  # Дополнительные алиасы для текстовых команд бота.
  # По умолчанию:
  #   weather / погода
  #   time / время
  #   help / помощь
  #   stop / стоп
  #   channels / каналы  (только ЛС админа — список channels.enabled_indices)
  #   msg / мсг  (только ЛС админа — «msg индекс:текст» в канал от лица бота)
  #   node / узел [hex-prefix]  (поиск узлов по началу публичного ключа)
  # Здесь можно добавить короткие синонимы, например `wz` для погоды.
  weather:
    aliases: []
    # Опционально: ограничить команду конкретными каналами.
    # Пусто/не задано — команда общая (во всех channels.enabled_indices).
    # channel_indices: [0]
  time:
    aliases: []
    # channel_indices: [0]
  help:
    aliases: []
    # channel_indices: [0]
  stop:
    aliases: []
    # channel_indices: [0]
  channels:
    aliases: []
    # channel_indices: [0]
  msg:
    aliases: []
    # channel_indices: [0]
  node:
    aliases: []
    # channel_indices: [0]
