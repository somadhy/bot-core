# Copy to config.yaml and adjust. Path: MESHCORE_BOT_CONFIG or ./config.yaml
#
# Docker (compose): в контейнере USB пробрасывается как /dev/ttyUSB0 — укажите его здесь,
# даже если на хосте порт /dev/ttyACM0 (см. SERIAL_DEVICE в docker-compose.yml).
#
# Диагностика (индексы каналов для channels.enabled_indices):
#   Docker:  docker compose --profile diagnose run --rm diagnose
#   Локально: python -m meshcore_bot --diagnose

serial:
  device: /dev/ttyUSB0   # Docker в compose: оставьте ttyUSB0. Windows без Docker: COM3
  baudrate: 115200

channels:
  enabled_indices: [0]

dm:
  enabled: true

locale: ru   # ru | en

# Пауза перед любым ответом бота (секунды). Максимум 600. 0 — без задержки.
reply_delay_sec: 0

# Периодический адверт узла (meshcore send_advert). 0 — выключено.
# Первый адверт после первого полного интервала с момента старта бота.
advert:
  interval_hours: 0
  flood: true   # true — широкий «flood»-адверт (см. прошивку / meshcore)

weather:
  # openmeteo — без API-ключа, обычно доступен из РФ (api.open-meteo.com)
  # openweathermap — нужен WEATHER_API_KEY
  provider: openmeteo
  default_city: Moscow

blacklist:
  path: data/blacklist.json

admins:
  # Full public keys (hex, 64 chars typical). Remote stop: stop / стоп — in DM (sender known).
  public_keys: []
  # Индексы каналов (должны быть в channels.enabled_indices), где stop / стоп разрешён любому участнику.
  channel_indices: []
