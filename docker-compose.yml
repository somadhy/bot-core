# Основной сценарий — Docker на Linux с пробросом USB serial.
#
# Бот (постоянно):
#   cp config.example.yaml config.yaml
#   # serial.device внутри контейнера обычно /dev/ttyUSB0 (см. devices ниже)
#   echo 'WEATHER_API_KEY=your_key' >> .env
#   docker compose up --build
#
# Диагностика Companion и список каналов (один раз, бот не стартует):
#   docker compose --profile diagnose run --rm diagnose
#
# Путь к устройству на хосте (если не /dev/ttyUSB0):
#   SERIAL_DEVICE=/dev/ttyACM0 docker compose up --build
#
# После админской !stop при restart: unless-stopped контейнер поднимется снова —
# docker compose stop или restart: "no".
#
# network_mode: host — сеть хоста (Linux). Нужно, если из bridge-контейнера
# не открываются внешние API (погода: Open-Meteo, wttr.in), а с хоста curl работает.

services:
  bot:
    build: .
    network_mode: host
    devices:
      - ${SERIAL_DEVICE:-/dev/ttyUSB0}:/dev/ttyUSB0
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
    environment:
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      RAPIDAPI_KEY: ${RAPIDAPI_KEY:-}
      MESHCORE_BOT_TRACE_POLL: ${MESHCORE_BOT_TRACE_POLL:-}
      MESHCORE_BOT_TRACE_CHANNEL_RAW: ${MESHCORE_BOT_TRACE_CHANNEL_RAW:-}
      MESHCORE_BOT_TRACE_RX_LOG: ${MESHCORE_BOT_TRACE_RX_LOG:-}
      MESHCORE_BOT_DEBUG: ${MESHCORE_BOT_DEBUG:-}
      MESHCORE_BOT_MESH_DEBUG: ${MESHCORE_BOT_MESH_DEBUG:-}
      # Keepalive to prevent USB/companion sleep during long idle.
      MESHCORE_BOT_KEEPALIVE_SEC: ${MESHCORE_BOT_KEEPALIVE_SEC:-60}
      MESHCORE_BOT_KEEPALIVE_ONLY_WHEN_IDLE_SEC: ${MESHCORE_BOT_KEEPALIVE_ONLY_WHEN_IDLE_SEC:-30}
    restart: unless-stopped

  diagnose:
    profiles: [diagnose]
    build: .
    network_mode: host
    devices:
      - ${SERIAL_DEVICE:-/dev/ttyUSB0}:/dev/ttyUSB0
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      RAPIDAPI_KEY: ${RAPIDAPI_KEY:-}
    command: ["python", "-m", "meshcore_bot", "--diagnose"]
